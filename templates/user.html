<!DOCTYPE html>
<html>
<head>
    <title>User Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        .navbar { background: #2ecc71; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .user-badge { background: #2acb6d; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; }
        button { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .error-message { 
            color: red; 
            text-align: center; 
            padding: 30px; 
            font-size: 18px; 
            background: #ffe6e6; 
            border-radius: 10px; 
            border: 2px solid red;
        }
        .error-message h2 { color: red; margin-bottom: 15px; font-size: 28px; }
        .error-message p { margin: 10px 0; }
        .success-message { 
            color: green; 
            text-align: center; 
            padding: 30px; 
            font-size: 18px; 
            background: #e6ffe6; 
            border-radius: 10px; 
            border: 2px solid green;
        }
        .success-message h2 { color: green; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2><span class="user-badge">USER</span> Panel</h2>
        <button onclick="logout()">Logout</button>
    </div>
    <div class="container">
        <div class="card">
            <h2>👤 User Dashboard</h2>
            <div id="userContent"></div>
            <a href="/dashboard-page" class="back-btn">← Back to Dashboard</a>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        let user = null;
        
        if (!token) window.location.href = '/';
        
        try {
            user = JSON.parse(localStorage.getItem('user') || '{}');
        } catch(e) {
            console.error("Error parsing user:", e);
        }
        
        const contentDiv = document.getElementById('userContent');
        
        // Check if user role is NOT 'user' (Admin or Manager trying to access)
        if (user.role !== 'user') {
            contentDiv.innerHTML = `
                <div class="error-message">
                    <h2>❌ ACCESS DENIED</h2>
                    <p>❌ This page is only for: <strong>user</strong></p>
                    <p>Your role: <strong style="color: red; font-size: 24px;">${(user.role || 'UNKNOWN').toUpperCase()}</strong></p>
                </div>
            `;
        } else {
            // User role is correct - show success
            contentDiv.innerHTML = `
                <div class="success-message">
                    <h2>✅ WELCOME ${(user.name || 'USER').toUpperCase()}</h2>
                    <p>👤 You are in your User Panel</p>
                    <p>📧 Email: ${user.email || 'N/A'}</p>
                    <p>🛡️ Role: ${(user.role || 'USER').toUpperCase()}</p>
                    <p>📋 You can view and edit your profile</p>
                </div>
            `;
        }
        
        function logout() { 
            localStorage.clear(); 
            window.location.href = '/'; 
        }
    </script>
</body>
</html>
