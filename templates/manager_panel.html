<!DOCTYPE html>
<html>
<head>
    <title>Manager Panel</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 50px auto; background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .manager-badge { background: #3498db; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        .error-message { 
            color: red; 
            text-align: center; 
            padding: 20px; 
            font-size: 18px; 
            background: #ffe6e6; 
            border-radius: 10px; 
            border: 2px solid red;
            margin: 20px 0;
        }
        .error-message h2 { color: red; margin-bottom: 15px; font-size: 24px; }
        .success-message { color: green; text-align: center; padding: 20px; font-size: 18px; background: #e6ffe6; border-radius: 10px; border: 2px solid green; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="manager-badge">MANAGER</span> Panel</h1>
        <div id="content"></div>
        <a href="/dashboard-page" class="back-btn">← Back to Dashboard</a>
        <button onclick="logout()">Logout</button>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) window.location.href = '/';
        
        const userRole = user.role;
        
        if (userRole !== 'manager') {
            document.getElementById('content').innerHTML = `
                <div class="error-message">
                    <h2>❌ Access Denied</h2>
                    <p>❌ This page is only for: <strong>manager</strong></p>
                    <p>Your role: <strong style="color: red; font-size: 20px;">${userRole}</strong></p>
                </div>
            `;
        } else {
            fetch('/api/manager', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.message) {
                    document.getElementById('content').innerHTML = `
                        <div class="success-message">
                            <h2>✅ Welcome to Manager Panel</h2>
                            <p>📊 You can manage team operations</p>
                            <p>📋 Permissions: View reports, manage team, approve requests</p>
                        </div>
                    `;
                } else {
                    document.getElementById('content').innerHTML = `
                        <div class="error-message">
                            <h2>❌ Access Denied</h2>
                            <p>❌ ${data.error || data.message}</p>
                        </div>
                    `;
                }
            });
        }
        
        function logout() { localStorage.clear(); window.location.href = '/'; }
    </script>
</body>
</html>
