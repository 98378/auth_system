<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #f0f2f5; }
        .navbar { background: #667eea; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .token-box { background: #f8f9fa; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 12px; overflow-x: auto; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; padding: 8px 15px; background: rgba(255,255,255,0.2); border-radius: 5px; display: inline-block; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .role-badge { display: inline-block; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-left: 10px; }
        .admin { background: #e74c3c; color: white; }
        .manager { background: #3498db; color: white; }
        .user { background: #2ecc71; color: white; }
        .qr-btn { background: #f39c12; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .qr-btn:hover { background: #e67e22; }
        .welcome-message { background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #28a745; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🔐 Auth System</h2>
        <div>
            <span id="userRoleBadge"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h3>👋 Welcome, <span id="userName"></span>!</h3>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Role:</strong> <span id="userRole"></span></p>
            <div id="roleWelcomeMessage" class="welcome-message"></div>
            <button class="qr-btn" onclick="getQRCode()">📱 Get QR Code Again</button>
        </div>
        
        <div class="card">
            <h3>📋 Navigation</h3>
            <div id="navLinks" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;"></div>
        </div>
        
        <div class="card">
            <h3>🔑 Your JWT Token</h3>
            <div class="token-box" id="tokenDisplay"></div>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">Use this token in Authorization: Bearer &lt;token&gt;</p>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) window.location.href = '/';
        
        document.getElementById('userName').innerText = user.name || 'User';
        document.getElementById('userEmail').innerText = user.email || 'N/A';
        document.getElementById('userRole').innerText = user.role || 'N/A';
        document.getElementById('tokenDisplay').innerText = token;
        
        const roleBadge = document.getElementById('userRoleBadge');
        const welcomeDiv = document.getElementById('roleWelcomeMessage');
        
        if (user.role === 'admin') {
            roleBadge.innerHTML = '<span class="role-badge admin">ADMIN</span>';
            welcomeDiv.innerHTML = `
                🛡️ <strong>Admin Access Granted!</strong><br>
                You have full system control. You can manage users, view all data.
            `;
        } else if (user.role === 'manager') {
            roleBadge.innerHTML = '<span class="role-badge manager">MANAGER</span>';
            welcomeDiv.innerHTML = `
                📊 <strong>Manager Access Granted!</strong><br>
                You can manage team operations, view reports, and approve requests.
            `;
        } else {
            roleBadge.innerHTML = '<span class="role-badge user">USER</span>';
            welcomeDiv.innerHTML = `
                👤 <strong>User Access Granted!</strong><br>
                You can view your profile and access user-specific content.
            `;
        }
        
    const navLinks = document.getElementById('navLinks');

if (user.role === 'admin') {
    // Admin sees all 3 panels in navigation
    navLinks.innerHTML = `
        <a href="/admin-page" style="background:#e74c3c;color:white;padding:10px 15px;text-decoration:none;border-radius:5px;">👑 Admin Panel</a>
        <a href="/manager-page" style="background:#3498db;color:white;padding:10px 15px;text-decoration:none;border-radius:5px;">📊 Manager Panel</a>
        <a href="/user-page" style="background:#2ecc71;color:white;padding:10px 15px;text-decoration:none;border-radius:5px;">👤 User Panel</a>
    `;
} else if (user.role === 'manager') {
    // Manager sees Manager Panel and User Panel
    navLinks.innerHTML = `
        <a href="/manager-page" style="background:#3498db;color:white;padding:10px 15px;text-decoration:none;border-radius:5px;">📊 Manager Panel</a>
        <a href="/user-page" style="background:#2ecc71;color:white;padding:10px 15px;text-decoration:none;border-radius:5px;">👤 User Panel</a>
    `;
} else {
    // User sees only User Panel
    navLinks.innerHTML = `
        <a href="/user-page" style="background:#2ecc71;color:white;padding:10px 15px;text-decoration:none;border-radius:5px;">👤 User Panel</a>
    `;
}
        function logout() { 
            localStorage.clear(); 
            window.location.href = '/'; 
        }
        
        async function getQRCode() {
            const email = user.email;
            const password = prompt("🔐 Enter your password to confirm identity:");
            
            if (!password) return;
            
            try {
                const response = await fetch('/api/auth/get-qr-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: email, password: password})
                });
                
                const data = await response.json();
                
                if (response.ok && data.qr_code) {
                    const win = window.open();
                    win.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Your 2FA QR Code</title>
                            <style>
                                body { font-family: Arial; text-align: center; padding: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
                                .container { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 500px; }
                                img { max-width: 250px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; padding: 10px; }
                                .secret { background: #f8f9fa; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 14px; word-break: break-all; }
                                button { margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; }
                            </style>
                        </head>
                        <body>
                            <div class="container">
                                <h2>📱 Scan QR Code</h2>
                                <p>Scan with <strong>Google Authenticator</strong> or any authenticator app</p>
                                <img src="data:image/png;base64,${data.qr_code}" alt="QR Code">
                                <p><strong>Or enter secret key manually:</strong></p>
                                <div class="secret">${data.secret}</div>
                                <button onclick="window.close()">Close</button>
                            </div>
                        </body>
                        </html>
                    `);
                } else {
                    alert('❌ Error: ' + (data.error || 'Could not generate QR code'));
                }
            } catch (error) {
                alert('❌ Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
