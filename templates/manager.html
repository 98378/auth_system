<!DOCTYPE html>
<html>
<head>
    <title>Manager Panel</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 50px auto; background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .manager-badge { background: #3498db; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 5px; }
        button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        .error-message { color: red; text-align: center; padding: 20px; font-size: 18px; }
        .error-message h2 { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="manager-badge">MANAGER</span> Panel</h1>
        <div id="content"></div>
        <a href="/dashboard-page" class="back-btn">← Back to Dashboard</a>
        <button onclick="logout()">Logout</button>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) window.location.href = '/';
        
        // Only manager can access this page
        if (user.role !== 'manager') {
            document.getElementById('content').innerHTML = `
                <div class="error-message">
                    <h2>❌ Access Denied</h2>
                    <p>❌ This page is only for: <strong>manager</strong></p>
                    <p>Your role: <strong style="color:red">${user.role}</strong></p>
                </div>
            `;
        } else {
            document.getElementById('content').innerHTML = `
                <p>📊 Welcome to Manager Panel</p>
                <p>✅ You can manage team operations</p>
                <p>📋 Permissions: View reports, manage team, approve requests</p>
            `;
        }
        
        function logout() { localStorage.clear(); window.location.href = '/'; }
    </script>
</body>
</html>
